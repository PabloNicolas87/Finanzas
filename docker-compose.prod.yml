version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-finanzas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: always
    depends_on:
      - db
    # AGREGÁ ESTO PARA PODER ENTRAR DESDE AFUERA:
    ports:
      - "4000:3005"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-finanzas}?schema=public
      PORT: 3005
    networks:
      - app_network
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://100.87.152.119:4000}
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      # This points to the backend. User mentioned Tailscale IP or localhost.
      # Defaulting to localhost of the host machine if accessed via browser.
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://100.87.152.119:4000}
    networks:
      - app_network

volumes:
  postgres_data:


networks:
  app_network:
    driver: bridge
